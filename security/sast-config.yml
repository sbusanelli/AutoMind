# Static Application Security Testing (SAST) Configuration
# Semgrep configuration for security scanning

rules:
  - id: sql-injection
    pattern: |
      $QUERY.$FUNC($INPUT)
    languages: [typescript, javascript]
    message: Potential SQL injection vulnerability
    severity: ERROR
    metadata:
      owasp: 'A03:2021 - Injection'
      cwe: 'CWE-89'

  - id: hardcoded-secrets
    pattern: |
      ($SECRET = $VALUE) where $VALUE ~= /(?i)(password|secret|key|token|api_key).*=/
    languages: [typescript, javascript]
    message: Hardcoded secret detected
    severity: ERROR
    metadata:
      owasp: 'A02:2021 - Cryptographic Failures'
      cwe: 'CWE-798'

  - id: weak-crypto
    pattern: |
      import($CRYPTO).md5
    languages: [typescript, javascript]
    message: Weak cryptographic algorithm (MD5) detected
    severity: WARNING
    metadata:
      owasp: 'A02:2021 - Cryptographic Failures'
      cwe: 'CWE-327'

  - id: eval-injection
    pattern: |
      eval($INPUT)
    languages: [typescript, javascript]
    message: eval() usage can lead to code injection
    severity: ERROR
    metadata:
      owasp: 'A03:2021 - Injection'
      cwe: 'CWE-94'

  - id: path-traversal
    pattern: |
      $FS.$FUNC($PATH + $USER_INPUT)
    languages: [typescript, javascript]
    message: Potential path traversal vulnerability
    severity: ERROR
    metadata:
      owasp: 'A01:2021 - Broken Access Control'
      cwe: 'CWE-22'

  - id: xss-vulnerability
    pattern: |
      $ELEMENT.innerHTML = $USER_INPUT
    languages: [typescript, javascript]
    message: Potential XSS vulnerability
    severity: ERROR
    metadata:
      owasp: 'A03:2021 - Injection'
      cwe: 'CWE-79'

  - id: insecure-random
    pattern: |
      Math.random()
    languages: [typescript, javascript]
    message: Insecure random number generation
    severity: WARNING
    metadata:
      owasp: 'A02:2021 - Cryptographic Failures'
      cwe: 'CWE-338'

  - id: weak-password-hash
    pattern: |
      bcrypt.hash($PASSWORD, $SALT)
    languages: [typescript, javascript]
    message: Weak password hashing detected
    severity: WARNING
    metadata:
      owasp: 'A07:2021 - Identification and Authentication Failures'
      cwe: 'CWE-532'

  - id: cors-misconfiguration
    pattern: |
      cors({ origin: "*" })
    languages: [typescript, javascript]
    message: Insecure CORS configuration
    severity: WARNING
    metadata:
      owasp: 'A05:2021 - Security Misconfiguration'
      cwe: 'CWE-942'

paths:
  - backend/src
  - frontend/src
exclude:
  - '**/*.test.ts'
  - '**/*.spec.ts'
  - 'node_modules/**'
  - 'dist/**'
