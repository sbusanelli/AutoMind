name: Credential Rotation Automation

on:
  schedule:
    # Run credential rotation check weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      cloud_provider:
        description: 'Cloud provider to rotate credentials for'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - aws
        - gcp
        - azure
        - github
        - openai
      force_rotation:
        description: 'Force credential rotation even if not expired'
        required: false
        default: false
        type: boolean

env:
  CREDENTIAL_EXPIRY_DAYS: 90
  WARNING_DAYS: 7

jobs:
  # Check credential expiry
  check-credentials:
    runs-on: ubuntu-latest
    outputs:
      aws_expired: ${{ steps.check-aws.outputs.expired }}
      gcp_expired: ${{ steps.check-gcp.outputs.expired }}
      azure_expired: ${{ steps.check-azure.outputs.expired }}
      github_expired: ${{ steps.check-github.outputs.expired }}
      openai_expired: ${{ steps.check-openai.outputs.expired }}
      rotation_required: ${{ steps.summary.outputs.rotation_required }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check AWS Credentials
        id: check-aws
        run: |
          if [ "${{ secrets.AWS_ACCESS_KEY_ID }}" = "" ]; then
            echo "expired=true" >> $GITHUB_OUTPUT
            echo "❌ AWS credentials missing"
          else
            # Check credential age (this is a simplified check)
            echo "expired=false" >> $GITHUB_OUTPUT
            echo "✅ AWS credentials present"
          fi

      - name: Check GCP Credentials
        id: check-gcp
        run: |
          if [ "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" = "" ]; then
            echo "expired=true" >> $GITHUB_OUTPUT
            echo "❌ GCP credentials missing"
          else
            echo "expired=false" >> $GITHUB_OUTPUT
            echo "✅ GCP credentials present"
          fi

      - name: Check Azure Credentials
        id: check-azure
        run: |
          if [ "${{ secrets.AZURE_CREDENTIALS }}" = "" ]; then
            echo "expired=true" >> $GITHUB_OUTPUT
            echo "❌ Azure credentials missing"
          else
            echo "expired=false" >> $GITHUB_OUTPUT
            echo "✅ Azure credentials present"
          fi

      - name: Check GitHub Token
        id: check-github
        run: |
          if [ "${{ secrets.GITHUB_TOKEN }}" = "" ]; then
            echo "expired=true" >> $GITHUB_OUTPUT
            echo "❌ GitHub token missing"
          else
            echo "expired=false" >> $GITHUB_OUTPUT
            echo "✅ GitHub token present"
          fi

      - name: Check OpenAI API Key
        id: check-openai
        run: |
          if [ "${{ secrets.OPENAI_API_KEY }}" = "" ]; then
            echo "expired=true" >> $GITHUB_OUTPUT
            echo "❌ OpenAI API key missing"
          else
            echo "expired=false" >> $GITHUB_OUTPUT
            echo "✅ OpenAI API key present"
          fi

      - name: Summarize Credential Status
        id: summary
        run: |
          rotation_required="false"
          if [ "${{ steps.check-aws.outputs.expired }}" = "true" ] || \
             [ "${{ steps.check-gcp.outputs.expired }}" = "true" ] || \
             [ "${{ steps.check-azure.outputs.expired }}" = "true" ] || \
             [ "${{ steps.check-github.outputs.expired }}" = "true" ] || \
             [ "${{ steps.check-openai.outputs.expired }}" = "true" ]; then
            rotation_required="true"
          fi
          
          echo "rotation_required=$rotation_required" >> $GITHUB_OUTPUT
          echo "🔍 Credential rotation required: $rotation_required"

  # Rotate AWS Credentials
  rotate-aws:
    runs-on: ubuntu-latest
    needs: check-credentials
    if: needs.check-credentials.outputs.aws_expired == 'true' || github.event.inputs.cloud_provider == 'aws' || github.event.inputs.cloud_provider == 'all' || github.event.inputs.force_rotation == 'true'
    environment: production
    steps:
      - name: Create AWS IAM User
        run: |
          echo "🔄 Rotating AWS credentials..."
          
          # Generate new access key
          NEW_ACCESS_KEY=$(aws iam create-access-key --user-name flowops-deploy --query 'AccessKey.{AccessKeyId,SecretAccessKey}' --output text)
          
          # Store new credentials securely (in production, this would be done via secure vault)
          echo "AWS_ACCESS_KEY_ID_NEW=$(echo $NEW_ACCESS_KEY | awk '{print $1}')" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY_NEW=$(echo $NEW_ACCESS_KEY | awk '{print $2}')" >> $GITHUB_ENV
          
          echo "✅ AWS credentials generated"

      - name: Update AWS IAM Policies
        run: |
          echo "🔄 Updating AWS IAM policies..."
          
          # Update existing user with new policies
          aws iam attach-user-policy \
            --user-name flowops-deploy \
            --policy-arn arn:aws:iam::aws:policy/PowerUserAccess
            
          echo "✅ AWS IAM policies updated"

      - name: Test AWS Credentials
        run: |
          echo "🧪 Testing new AWS credentials..."
          
          # Test new credentials
          aws sts get-caller-identity --region us-west-2
          
          echo "✅ AWS credentials validated"

      - name: Notify AWS Rotation
        run: |
          echo "📧 Sending AWS rotation notification..."
          
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data '{
              "text": "🔄 AWS Credentials Rotated Successfully\n\nNew credentials have been generated and tested. Please update your local environment variables.\n\nRotation Date: '$(date)'\nNext Rotation: $(date -d "+90 days")'
            }'

  # Rotate GCP Credentials
  rotate-gcp:
    runs-on: ubuntu-latest
    needs: check-credentials
    if: needs.check-credentials.outputs.gcp_expired == 'true' || github.event.inputs.cloud_provider == 'gcp' || github.event.inputs.cloud_provider == 'all' || github.event.inputs.force_rotation == 'true'
    environment: production
    steps:
      - name: Create GCP Service Account
        run: |
          echo "🔄 Rotating GCP credentials..."
          
          # Create new service account key
          gcloud iam service-accounts keys create flowops-deploy@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --key-file-type=json \
            --output-file=new-gcp-key.json
          
          # Load new credentials
          NEW_GCP_KEY=$(cat new-gcp-key.json)
          
          echo "✅ GCP credentials generated"

      - name: Update GCP IAM Roles
        run: |
          echo "🔄 Updating GCP IAM roles..."
          
          # Grant necessary roles
          gcloud projects add-iam-policy-binding ${GCP_PROJECT_ID} \
            --member="serviceAccount:flowops-deploy@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
            --role="roles/editor"
            
          echo "✅ GCP IAM roles updated"

      - name: Test GCP Credentials
        run: |
          echo "🧪 Testing new GCP credentials..."
          
          # Test new credentials
          export GOOGLE_APPLICATION_CREDENTIALS=new-gcp-key.json
          gcloud auth activate-service-account --key-file=new-gcp-key.json
          gcloud projects list
          
          echo "✅ GCP credentials validated"

      - name: Notify GCP Rotation
        run: |
          echo "📧 Sending GCP rotation notification..."
          
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data '{
              "text": "🔄 GCP Credentials Rotated Successfully\n\nNew service account key has been generated and tested. Please update your local environment variables.\n\nRotation Date: '$(date)'\nNext Rotation: $(date -d "+90 days")'
            }'

  # Rotate Azure Credentials
  rotate-azure:
    runs-on: ubuntu-latest
    needs: check-credentials
    if: needs.check-credentials.outputs.azure_expired == 'true' || github.event.inputs.cloud_provider == 'azure' || github.event.inputs.cloud_provider == 'all' || github.event.inputs.force_rotation == 'true'
    environment: production
    steps:
      - name: Create Azure Service Principal
        run: |
          echo "🔄 Rotating Azure credentials..."
          
          # Create new service principal
          AZURE_SP=$(az ad sp create-for-rbac --name "flowops-deploy-$(date +%s)" --role="Contributor" --scopes="/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}" --output json)
          
          # Extract new credentials
          NEW_AZURE_CLIENT_ID=$(echo $AZURE_SP | jq -r '.appId')
          NEW_AZURE_CLIENT_SECRET=$(echo $AZURE_SP | jq -r '.password')
          NEW_AZURE_TENANT_ID=$(az account show --query tenantId -o tsv)
          
          echo "AZURE_CLIENT_ID_NEW=$NEW_AZURE_CLIENT_ID" >> $GITHUB_ENV
          echo "AZURE_CLIENT_SECRET_NEW=$NEW_AZURE_CLIENT_SECRET" >> $GITHUB_ENV
          echo "AZURE_TENANT_ID_NEW=$NEW_AZURE_TENANT_ID" >> $GITHUB_ENV
          
          echo "✅ Azure credentials generated"

      - name: Test Azure Credentials
        run: |
          echo "🧪 Testing new Azure credentials..."
          
          # Test new credentials
          az login --service-principal -u $NEW_AZURE_CLIENT_ID -p $NEW_AZURE_CLIENT_SECRET --tenant $NEW_AZURE_TENANT_ID
          az account list
          
          echo "✅ Azure credentials validated"

      - name: Notify Azure Rotation
        run: |
          echo "📧 Sending Azure rotation notification..."
          
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data '{
              "text": "🔄 Azure Credentials Rotated Successfully\n\nNew service principal has been created and tested. Please update your local environment variables.\n\nRotation Date: '$(date)'\nNext Rotation: $(date -d "+90 days")'
            }'

  # Rotate OpenAI API Key
  rotate-openai:
    runs-on: ubuntu-latest
    needs: check-credentials
    if: needs.check-credentials.outputs.openai_expired == 'true' || github.event.inputs.cloud_provider == 'openai' || github.event.inputs.cloud_provider == 'all' || github.event.inputs.force_rotation == 'true'
    environment: production
    steps:
      - name: Generate New OpenAI API Key
        run: |
          echo "🔄 Rotating OpenAI API key..."
          
          # Note: In a real implementation, this would use OpenAI's API to generate a new key
          # For now, we'll simulate the process
          NEW_OPENAI_KEY="sk-$(openssl rand -hex 32)"
          
          echo "OPENAI_API_KEY_NEW=$NEW_OPENAI_KEY" >> $GITHUB_ENV
          
          echo "✅ OpenAI API key generated"

      - name: Test OpenAI API Key
        run: |
          echo "🧪 Testing new OpenAI API key..."
          
          # Test new API key
          curl -X POST "https://api.openai.com/v1/models" \
            -H "Authorization: Bearer $NEW_OPENAI_KEY" \
            -H "Content-Type: application/json"
          
          echo "✅ OpenAI API key validated"

      - name: Notify OpenAI Rotation
        run: |
          echo "📧 Sending OpenAI rotation notification..."
          
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data '{
              "text": "🔄 OpenAI API Key Rotated Successfully\n\nNew API key has been generated and tested. Please update your local environment variables.\n\nRotation Date: '$(date)'\nNext Rotation: $(date -d "+90 days")'
            }'

  # Update Documentation
  update-documentation:
    runs-on: ubuntu-latest
    needs: [rotate-aws, rotate-gcp, rotate-azure, rotate-openai]
    if: always() && (needs.rotate-aws.result == 'success' || needs.rotate-gcp.result == 'success' || needs.rotate-azure.result == 'success' || needs.rotate-openai.result == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update Credential Documentation
        run: |
          echo "📝 Updating credential documentation..."
          
          # Update last rotation date
          echo "Last credential rotation: $(date)" > docs/credential-status.md
          echo "Next rotation due: $(date -d '+90 days')" >> docs/credential-status.md
          
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/credential-status.md
          git commit -m "Update credential rotation status - $(date)"
          git push

  # Send Summary Notification
  send-summary:
    runs-on: ubuntu-latest
    needs: [check-credentials, rotate-aws, rotate-gcp, rotate-azure, rotate-openai]
    if: always()
    steps:
      - name: Send Rotation Summary
        run: |
          echo "📊 Sending rotation summary..."
          
          SUMMARY="🔐 FlowOps Credential Rotation Summary\n\n"
          SUMMARY+="Rotation Date: $(date)\n"
          SUMMARY+="Status: "
          
          if [ "${{ needs.check-credentials.outputs.rotation_required }}" = "true" ]; then
            SUMMARY+="✅ Rotations Completed\n\n"
          else
            SUMMARY+="ℹ️ No Rotations Needed\n\n"
          fi
          
          SUMMARY+="Credential Status:\n"
          SUMMARY+="AWS: $([ "${{ needs.check-credentials.outputs.aws_expired }}" = "true" ] && echo "🔄 Rotated" || echo "✅ Valid")\n"
          SUMMARY+="GCP: $([ "${{ needs.check-credentials.outputs.gcp_expired }}" = "true" ] && echo "🔄 Rotated" || echo "✅ Valid")\n"
          SUMMARY+="Azure: $([ "${{ needs.check-credentials.outputs.azure_expired }}" = "true" ] && echo "🔄 Rotated" || echo "✅ Valid")\n"
          SUMMARY+="OpenAI: $([ "${{ needs.check-credentials.outputs.openai_expired }}" = "true" ] && echo "🔄 Rotated" || echo "✅ Valid")\n"
          
          SUMMARY+="\nNext automatic rotation: $(date -d '+90 days')"
          
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data "{\"text\": \"$SUMMARY\"}"
