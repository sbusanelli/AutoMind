name: Dependency Security Updates

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Check for security updates
        run: |
          echo "🔍 Checking for security updates..."
          
          # Check npm updates
          npm outdated --json > npm-outdated.json || true
          
          # Check for known vulnerabilities
          npm audit --json > npm-audit.json || true
          
          # Parse results
          if [ -f npm-outdated.json ]; then
            echo "### Outdated packages:" >> $GITHUB_STEP_SUMMARY
            cat npm-outdated.json | jq -r '.[] | select(.wanted != .latest) | {name: .name, current: .current, wanted: .wanted, latest: .latest}' >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f npm-audit.json ]; then
            echo "### Security vulnerabilities:" >> $GITHUB_STEP_SUMMARY
            cat npm-audit.json | jq -r '.vulnerabilities[] | select(.severity == "high" or .severity == "moderate") | {package: .name, severity: .severity, title: .title}' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Update dependencies
        run: |
          echo "🔄 Updating dependencies..."
          
          # Update all packages to latest secure versions
          npm update --save --audit-level moderate || true
          
          # Install updated packages
          npm install || true
          
          # Run audit to verify fixes
          npm audit --audit-level moderate

      - name: Create pull request
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🔒 Security update: Update dependencies to latest secure versions"
          title: "Security: Update dependencies to latest secure versions"
          body: |
            ## Security Dependency Update
            
            This PR updates all dependencies to their latest secure versions to address security vulnerabilities.
            
            ### Changes
            - Updated all packages to latest secure versions
            - Fixed npm audit vulnerabilities
            - Updated package-lock.json
            
            ### Verification
            - ✅ npm audit passed
            - ✅ All dependencies are up to date
            - ✅ No known security vulnerabilities
            
            ### Next Steps
            - Review and merge this PR
            - Monitor for new security advisories
            
            Auto-generated by security update workflow
          branch: security/update-dependencies
          delete-branch: true
