name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [22]
        
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: flowops_test
        options: >-
          --health-cmd pg_isready -U postgres
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm run build

      - name: Run Unit Tests
        run: |
          npm run test:unit -- --coverage --watchAll=false
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flowops_test
          REDIS_URL: redis://localhost:6379
          VAULT_ADDR: http://localhost:8200
          VAULT_TOKEN: test-token

      - name: Run Integration Tests
        run: |
          npm run test:integration -- --coverage --watchAll=false
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flowops_test
          REDIS_URL: redis://localhost:6379
          VAULT_ADDR: http://localhost:8200
          VAULT_TOKEN: test-token

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
        if: matrix.node-version == '22'

      - name: Run E2E Tests
        run: |
          npm run test:e2e
        env:
          NODE_ENV: test
          TEST_BASE_URL: http://localhost:3000
          BROWSER: chrome

      - name: Upload E2E screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots
          path: tests/e2e/screenshots/

      - name: Performance Tests
        run: |
          npm run test:performance
        env:
          NODE_ENV: test

      - name: Security Tests
        run: |
          npm run security:audit
          npm run security:sast
        env:
          NODE_ENV: test

  test-matrix:
    runs-on: ubuntu-latest
    needs: test
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [22]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run all tests
        run: npm run test:ci
        env:
          NODE_ENV: test

      - name: Generate test report
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "| OS | Node.js | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ matrix.os }} | ${{ matrix.node-version }} | ✅ Passed |" >> $GITHUB_STEP_SUMMARY

  coverage:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: coverage/

      - name: Generate coverage report
        run: |
          echo "## 📊 Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "coverage/coverage-summary.json" ]; then
            COVERAGE=$(cat coverage/coverage-summary.json | jq -r '.total.lines.pct')
            echo "### Overall Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Coverage by File" >> $GITHUB_STEP_SUMMARY
            cat coverage/coverage-summary.json | jq -r '.files | to_entries[] | "| \(.key) | \(.value.lines.pct) |%"' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            if (fs.existsSync('coverage/coverage-summary.json')) {
              const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              const totalCoverage = coverage.total.lines.pct;
              
              const comment = `## 📊 Test Coverage Report
              
              **Overall Coverage: ${totalCoverage}%**
              
              ${totalCoverage >= 80 ? '✅' : '⚠️'} Coverage threshold met
              
              ### Coverage Details
              ${Object.entries(coverage.files).map(([file, data]) => 
                `| ${file} | ${data.lines.pct}% |`
              ).join('\n')}
              `;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

  e2e:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Start application
        run: |
          npm run build
          npm run start &
          sleep 10
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flowops_test
          REDIS_URL: redis://localhost:6379

      - name: Wait for application
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:3000/health; do sleep 2; done'

      - name: Run E2E tests
        run: |
          npm run test:e2e
        env:
          TEST_BASE_URL: http://localhost:3000
          BROWSER: chrome
          HEADLESS: true

      - name: Upload E2E results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: |
            tests/e2e/reports/
            tests/e2e/screenshots/

  performance:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run performance tests
        run: |
          npm run test:performance
        env:
          NODE_ENV: test

      - name: Upload performance reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-reports
          path: tests/performance/reports/

  security:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run security tests
        run: |
          npm run security:audit
          npm run security:sast
        env:
          NODE_ENV: test

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: security/reports/

  notify:
    runs-on: ubuntu-latest
    needs: [test, coverage, e2e, performance, security]
    if: always()
    
    steps:
      - name: Notify test results
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ needs.test.result }}' === 'success' ? '✅' : '❌';
            const coverageStatus = '${{ needs.coverage.result }}' === 'success' ? '✅' : '❌';
            const e2eStatus = '${{ needs.e2e.result }}' === 'success' ? '✅' : '❌';
            const performanceStatus = '${{ needs.performance.result }}' === 'success' ? '✅' : '❌';
            const securityStatus = '${{ needs.security.result }}' === 'success' ? '✅' : '❌';
            
            const message = `## 🧪 FlowOps Test Results
            
            ### Test Suite Status
            | Test Type | Status |
            |------------|--------|
            | Unit Tests | ${status} |
            | Integration Tests | ${status} |
            | E2E Tests | ${e2eStatus} |
            | Performance Tests | ${performanceStatus} |
            | Security Tests | ${securityStatus} |
            | Coverage Report | ${coverageStatus} |
            
            **Overall Status: ${status}**
            
            ---
            
            *This comment was automatically generated by the FlowOps test suite.*`;
            
            if (context.event_name === 'pull_request') {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: message
              });
            }
