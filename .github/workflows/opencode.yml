name: OpenCode AI Code Review

on:
  # Trigger on issue comments containing /opencode or /oc
  issue_comment:
    types: [created]
  
  # Trigger on pull request review comments containing /opencode or /oc
  pull_request_review_comment:
    types: [created]
  
  # Trigger on new pull requests (optional automatic review)
  pull_request:
    types: [opened, synchronize, reopened]
  
  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      model:
        description: 'Model to use for OpenCode'
        required: false
        default: 'anthropic/claude-sonnet-4-20250514'
        type: choice
        options:
          - 'anthropic/claude-sonnet-4-20250514'
          - 'anthropic/claude-3-haiku-20240307'
          - 'openai/gpt-4o'
          - 'openai/gpt-4o-mini'
      custom_prompt:
        description: 'Custom prompt for OpenCode'
        required: false
        type: string

jobs:
  opencode-review:
    # Run on manual trigger, PR comments, or new PRs
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, '/opencode') ||
      github.event_name == 'pull_request'
    
    runs-on: ubuntu-latest
    
    permissions:
      # Required for OpenCode to operate
      id-token: write
      contents: read
      pull-requests: write
      issues: write
      checks: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better context
          persist-credentials: false
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies (for context)
        run: |
          if [ -f "backend/package.json" ]; then
            cd backend && npm ci --no-audit --no-fund
          fi
          if [ -f "frontend/package.json" ]; then
            cd frontend && npm ci --no-audit --no-fund
          fi
      
      - name: Run OpenCode AI Review
        uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          # Model configuration
          model: ${{ github.event.inputs.model || 'anthropic/claude-sonnet-4-20250514' }}
          
          # Share session for public repos (helps improve OpenCode)
          share: true
          
          # Custom prompt if provided
          prompt: ${{ github.event.inputs.custom_prompt || '' }}
      
      - name: Upload OpenCode logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opencode-logs
          path: |
            .opencode/
            *.log
          retention-days: 7
      
      - name: Comment with review summary
        if: github.event_name == 'pull_request' && !contains(github.event.comment.body, '/oc') && !contains(github.event.comment.body, '/opencode')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Look for OpenCode output
            let summary = "## OpenCode AI Review\n\n";
            
            try {
              if (fs.existsSync('.opencode/output.md')) {
                const output = fs.readFileSync('.opencode/output.md', 'utf8');
                summary += output;
              } else {
                summary += "OpenCode analysis completed. Check the workflow logs for detailed results.\n\n";
                summary += "### How to use:\n";
                summary += "- Comment `/opencode` for detailed analysis\n";
                summary += "- Comment `/oc` for quick review\n";
                summary += "- Use `/opencode <your custom prompt>` for specific requests\n";
              }
            } catch (error) {
              summary += "OpenCode review completed. Check the workflow logs for detailed analysis.\n\n";
              summary += "*Note: Configure ANTHROPIC_API_KEY or OPENAI_API_KEY in repository secrets for better results.*\n";
            }
            
            summary += "\n---\n";
            summary += "*Powered by OpenCode AI*";
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  # Separate job for scheduled reviews (optional)
  scheduled-review:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run OpenCode on recent changes
        uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          model: anthropic/claude-3-haiku-20240307
          prompt: |
            Review the recent changes in this repository focusing on:
            1. Code quality and best practices
            2. Security vulnerabilities
            3. Performance considerations
            4. Documentation completeness
            5. Test coverage gaps
            
            Provide actionable feedback and suggestions for improvement.
          share: true
