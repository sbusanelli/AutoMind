AWSTemplateFormatVersion: '2010-09-09'
Description: 'AutoMind EKS Infrastructure - AWS'

Parameters:
  Environment:
    Type: String
    Default: 'staging'
    AllowedValues: ['staging', 'production']
    Description: 'Deployment environment'
  
  KubernetesVersion:
    Type: String
    Default: '1.29'
    AllowedValues: ['1.28', '1.29', '1.30']
    Description: 'EKS Kubernetes version'

Resources:
  # VPC Configuration
  AutoMindVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub 'automind-${Environment}-vpc'
        - Key: Project
          Value: 'AutoMind'

  # Public Subnets
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AutoMindVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'automind-${Environment}-public-subnet-1'
        - Key: kubernetes.io/role/elb
          Value: '1'

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AutoMindVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'automind-${Environment}-public-subnet-2'
        - Key: kubernetes.io/role/elb
          Value: '1'

  # Private Subnets
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AutoMindVPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub 'automind-${Environment}-private-subnet-1'
        - Key: kubernetes.io/role/internal-elb
          Value: '1'

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AutoMindVPC
      CidrBlock: 10.0.4.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub 'automind-${Environment}-private-subnet-2'
        - Key: kubernetes.io/role/internal-elb
          Value: '1'

  # Internet Gateway
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub 'automind-${Environment}-igw'

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref AutoMindVPC
      InternetGatewayId: !Ref InternetGateway

  # NAT Gateways
  NATGateway1EIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc

  NATGateway1:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NATGateway1EIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub 'automind-${Environment}-nat-1'

  # Route Tables
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref AutoMindVPC
      Tags:
        - Key: Name
          Value: !Sub 'automind-${Environment}-public-rt'

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref AutoMindVPC
      Tags:
        - Key: Name
          Value: !Sub 'automind-${Environment}-private-rt'

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NATGateway1

  # EKS Cluster
  AutoMindEKSCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Sub 'automind-${Environment}-eks'
      Version: !Ref KubernetesVersion
      RoleArn: !GetAtt AutoMindEKSClusterRole.Arn
      ResourcesVpcConfig:
        SubnetIds:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
          - !Ref PublicSubnet1
          - !Ref PublicSubnet2
        EndpointPublicAccess: true
        EndpointPrivateAccess: true
        PublicAccessCidrs:
          - 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub 'automind-${Environment}-eks'
        - Key: Project
          Value: 'AutoMind'

  # EKS Cluster IAM Role
  AutoMindEKSClusterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'automind-${Environment}-eks-cluster-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy

  # EKS Node Group
  AutoMindNodeGroup:
    Type: AWS::EKS::Nodegroup
    Properties:
      ClusterName: !Ref AutoMindEKSCluster
      NodegroupName: !Sub 'automind-${Environment}-node-group'
      NodeRole: !GetAtt AutoMindNodeRole.Arn
      Subnets:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      InstanceTypes:
        - t3.medium
        - t3.large
      ScalingConfig:
        MinSize: 2
        DesiredSize: 3
        MaxSize: 10
      AmiType: AL2_x86_64
      CapacityType: ON_DEMAND
      Tags:
        - Key: Name
          Value: !Sub 'automind-${Environment}-node'
        - Key: Project
          Value: 'AutoMind'

  # EKS Node IAM Role
  AutoMindNodeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'automind-${Environment}-eks-node-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  # EKS Add-ons
  AutoMindCoreDNSAddon:
    Type: AWS::EKS::Addon
    Properties:
      ClusterName: !Ref AutoMindEKSCluster
      AddonName: coredns
      AddonVersion: latest

  AutoMindKubeProxyAddon:
    Type: AWS::EKS::Addon
    Properties:
      ClusterName: !Ref AutoMindEKSCluster
      AddonName: kube-proxy
      AddonVersion: latest

  AutoMindVPCCNIAddon:
    Type: AWS::EKS::Addon
    Properties:
      ClusterName: !Ref AutoMindEKSCluster
      AddonName: vpc-cni
      AddonVersion: latest

  # Security Groups
  AutoMindClusterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'AutoMind EKS Cluster security group'
      VpcId: !Ref AutoMindVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref AutoMindNodeSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub 'automind-${Environment}-cluster-sg'

  AutoMindNodeSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'AutoMind EKS Node security group'
      VpcId: !Ref AutoMindVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 1025
          ToPort: 65535
          SourceSecurityGroupId: !Ref AutoMindClusterSecurityGroup
        - IpProtocol: tcp
          FromPort: 1025
          ToPort: 65535
          SourceSecurityGroupId: !Ref AutoMindNodeSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub 'automind-${Environment}-node-sg'

  # Application Load Balancer for Ingress
  AutoMindLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub 'automind-${Environment}-alb'
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref AutoMindSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub 'automind-${Environment}-alb'

  # Security Group for ALB
  AutoMindSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'AutoMind ALB security group'
      VpcId: !Ref AutoMindVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub 'automind-${Environment}-alb-sg'

Outputs:
  ClusterName:
    Description: 'EKS Cluster Name'
    Value: !Ref AutoMindEKSCluster
    Export:
      Name: !Sub 'automind-${Environment}-eks-name'

  ClusterEndpoint:
    Description: 'EKS Cluster Endpoint'
    Value: !GetAtt AutoMindEKSCluster.Endpoint
    Export:
      Name: !Sub 'automind-${Environment}-eks-endpoint'

  LoadBalancerDNS:
    Description: 'Load Balancer DNS Name'
    Value: !GetAtt AutoMindLoadBalancer.DNSName
    Export:
      Name: !Sub 'automind-${Environment}-alb-dns'

  VPCId:
    Description: 'VPC ID'
    Value: !Ref AutoMindVPC
    Export:
      Name: !Sub 'automind-${Environment}-vpc-id'

  PrivateSubnetIds:
    Description: 'Private Subnet IDs'
    Value: !Join [',', [!Ref PrivateSubnet1, !Ref PrivateSubnet2]]
    Export:
      Name: !Sub 'automind-${Environment}-private-subnets'

  PublicSubnetIds:
    Description: 'Public Subnet IDs'
    Value: !Join [',', [!Ref PublicSubnet1, !Ref PublicSubnet2]]
    Export:
      Name: !Sub 'automind-${Environment}-public-subnets'
