apiVersion: v1
kind: ConfigMap
metadata:
  name: automind-config
  namespace: automind
  labels:
    app: automind
    component: backend
data:
  NODE_ENV: "staging"
  PORT: "5000"
  DB_HOST: "automind-postgres.automind.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "automind"
  REDIS_HOST: "automind-redis.automind.svc.cluster.local"
  REDIS_PORT: "6379"
  JWT_EXPIRES_IN: "7d"
  CORS_ORIGIN: "http://localhost:3000"
  LOG_LEVEL: "info"
  METRICS_ENABLED: "true"
  AI_MODEL_ENDPOINT: "https://api.openai.com/v1/chat/completions"
  AI_MAX_TOKENS: "2048"
  AI_TEMPERATURE: "0.7"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: automind-config
  namespace: automind-prod
  labels:
    app: automind
    component: backend
data:
  NODE_ENV: "production"
  PORT: "5000"
  DB_HOST: "automind-postgres.automind-prod.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "automind"
  REDIS_HOST: "automind-redis.automind-prod.svc.cluster.local"
  REDIS_PORT: "6379"
  JWT_EXPIRES_IN: "24h"
  CORS_ORIGIN: "https://automind.yourdomain.com"
  LOG_LEVEL: "warn"
  METRICS_ENABLED: "true"
  AI_MODEL_ENDPOINT: "https://api.openai.com/v1/chat/completions"
  AI_MAX_TOKENS: "4096"
  AI_TEMPERATURE: "0.5"
