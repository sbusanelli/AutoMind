apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: automind-ingress
  namespace: automind
  annotations:
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '30'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '3'
    alb.ingress.kubernetes.io/success-codes: '200'
    alb.ingress.kubernetes.io/load-balancer-name: "automind-alb"
    alb.ingress.kubernetes.io/tags: "Environment=staging,Project=automind,ManagedBy=k8s"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    cert-manager.io/issuer-kind: "ClusterIssuer"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecRequestBodyAccess On
      SecResponseBodyAccess On
      SecRequestBodyLimit 13107200
      SecRequestBodyNoFiles Limit 131072
spec:
  tls:
  - hosts:
    - automind.yourdomain.com
    secretName: automind-tls
  rules:
  - host: automind.yourdomain.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: automind-backend
            port:
              number: 5000
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: automind-backend
            port:
              number: 5000
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: automind-backend
            port:
              number: 5000
      - path: /ready
        pathType: Prefix
        backend:
          service:
            name: automind-backend
            port:
              number: 5000
      - path: /metrics
        pathType: Prefix
        backend:
          service:
            name: automind-backend
            port:
              number: 5000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: automind-frontend
            port:
              number: 3000
