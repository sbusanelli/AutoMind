apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: automind-kubernetes-manifests
  annotations:
    configmanagement.gke.io/managed: "disabled"

resources:
# Namespaces
- namespace.yaml

# Service Accounts
- service-account.yaml

# Configuration
- configmap.yaml
- secret.yaml

# Database and Cache
- postgres.yaml
- redis.yaml

# Applications
- backend.yaml
- frontend.yaml

# Networking
- ingress.yaml
- network-policy.yaml

# Scaling
- hpa.yaml

# Monitoring
- monitoring.yaml

commonLabels:
  app: automind
  project: automind
  managed-by: kustomize

commonAnnotations:
  automind.com/version: "v1.0.0"
  automind.com/managed-by: "kustomize"
  automind.com/environment: "staging"

namespace: automind

configMapGenerator:
- name: automind-config
  envs:
  - config.env
  literals:
  - LOG_LEVEL=info
  - METRICS_ENABLED=true
  - AI_MODEL_ENDPOINT=https://api.openai.com/v1/chat/completions
  - AI_MAX_TOKENS=2048
  - AI_TEMPERATURE=0.7

secretGenerator:
- name: automind-secrets
  envs:
  - secrets.env

patchesStrategicMerge:
# Environment-specific patches
- patches/backend-patch.yaml
- patches/frontend-patch.yaml
- patches/postgres-patch.yaml
- patches/ingress-patch.yaml

patchesJson6902:
# Target specific configurations
- target:
    group: apps
    version: v1
    kind: Deployment
    name: automind-backend
  path: patches/backend-resources.json
- target:
    group: apps
    version: v1
    kind: Deployment
    name: automind-frontend
  path: patches/frontend-resources.json

images:
- name: sbusanelli/automind-backend
  newTag: latest
- name: sbusanelli/automind-frontend
  newTag: latest

replicas:
# Override replica counts
- name: automind-backend
  count: 3
- name: automind-frontend
  count: 2
- name: automind-redis
  count: 1

resources:
# Resource limits and requests
- name: automind-backend
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi
- name: automind-frontend
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
- name: automind-postgres
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi
- name: automind-redis
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
