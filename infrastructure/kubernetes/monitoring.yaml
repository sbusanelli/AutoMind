apiVersion: v1
kind: ServiceMonitor
metadata:
  name: automind-backend-metrics
  namespace: automind
  labels:
    app: automind
    component: backend
    release: prometheus
spec:
  selector:
    matchLabels:
      app: automind
      component: backend
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
---
