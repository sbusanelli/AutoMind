apiVersion: apps/v1
kind: Deployment
metadata:
  name: automind-frontend
  namespace: automind
  labels:
    app: automind
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: automind
      component: frontend
  template:
    metadata:
      labels:
        app: automind
        component: frontend
    spec:
      containers:
      - name: frontend
        image: sbusanelli/automind-frontend:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: REACT_APP_API_URL
          value: "http://automind-backend.automind.svc.cluster.local:5000"
        - name: REACT_APP_WS_URL
          value: "ws://automind-backend.automind.svc.cluster.local:5000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: automind-frontend
  namespace: automind
  labels:
    app: automind
    component: frontend
spec:
  selector:
    app: automind
    component: frontend
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  type: ClusterIP
